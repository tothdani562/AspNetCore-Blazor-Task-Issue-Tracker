services:
  postgres:
    image: postgres:17-alpine
    container_name: tasktracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tasktracker_db}
      POSTGRES_USER: ${POSTGRES_USER:-tasktracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasktracker_docker_password}
    ports:
      - "5432:5432"
    volumes:
      - tasktracker_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tasktracker} -d ${POSTGRES_DB:-tasktracker_db}"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  tasktracker_postgres_data:
